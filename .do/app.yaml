name: it-recruit
region: blr

services:
  - name: it-recruit
    github:
      repo: SYerkin/it-recruit
      branch: main
      deploy_on_push: true
    build_command: npm run build
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/health
